[build]
  command   = "npm run build"
  publish   = "dist"

[build.environment]
  NODE_VERSION = "20"

# ── SPA routing: redirect all paths to index.html ─────────────────────────
# Required so that page refreshes on any route don't 404.
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
